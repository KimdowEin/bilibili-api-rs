[package]
name = "bilibili-api-rs"
version = "0.1.0"
edition = "2021"

[dependencies]
base64 = "0.22.1"
md5 = "0.7.0"
rand = "0.8.5"
rsa = "0.9.6"
serde = { version = "1.0.210", features = ["derive"] }
serde_json = "1.0.128"
serde_qs = "0.13.0"
serde_repr = "0.1.19"

# tokio = { version = "1.40.0", features = ["full"] }
# reqwest = { version = "0.12.7", features = ["cookies", "json", "stream"] }
# webbrowser = { version = "1.0.2" }
tokio = { version = "1.40.0", optional = true, features = ["full"] }
reqwest = { version = "0.12.7", optional = true, features = [
    "cookies",
    "json",
    "stream",
] }
webbrowser = { version = "1.0.2", optional = true }

futures-util = "0.3.30"
[features]
session = ["reqwest","tokio"]
manual = ["webbrowser", "session"]
